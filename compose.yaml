name: describeops

services:
  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    env_file:
      - .env
    command:
      - sh
      - -c
      - >-
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn describeops_backend.wsgi:application
        --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 300
        --access-logfile - --error-logfile -
    expose:
      - "8000"
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          r=urllib.request.Request('http://127.0.0.1:8000/health',
          headers={'X-Forwarded-Proto':'https'});
          urllib.request.urlopen(r, timeout=5).read()"
      interval: 15s
      timeout: 6s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_API_TOKEN: ${VITE_API_TOKEN:-}
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in .env}
      LOGS_BASIC_AUTH_USER: ${LOGS_BASIC_AUTH_USER:-logs}
      LOGS_BASIC_AUTH_HASH: ${LOGS_BASIC_AUTH_HASH:-$$2b$$14$$13b53w8I8wpJ2NBO1ex/BeligGAitYp1sUheFLoDk.vzfsC9qcpD6}
    depends_on:
      backend:
        condition: service_healthy
      dozzle:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - media:/srv/media:ro
      - static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    command:
      - --base
      - /logs
      - --no-analytics
    expose:
      - "8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dozzle_data:/data
    restart: unless-stopped

volumes:
  media:
  static:
  caddy_data:
  caddy_config:
  dozzle_data:
