name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: alibaba-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Verify web app
        run: |
          npm run typecheck:web
          npm run test:web
          npm run build:web

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          working-directory: backend
          cache-dependency-glob: uv.lock

      - name: Install Python
        working-directory: backend
        run: uv python install "$PYTHON_VERSION"

      - name: Verify backend
        working-directory: backend
        run: |
          uv run --frozen python manage.py check
          uv run --frozen pytest

  deploy:
    name: Deploy Compose stack to ECS
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    env:
      ECS_HOST: ${{ secrets.ECS_HOST }}
      ECS_SSH_USER: ${{ secrets.ECS_SSH_USER }}
      ECS_SSH_PORT: ${{ secrets.ECS_SSH_PORT }}
      ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
      ECS_APP_DIR: ${{ secrets.ECS_APP_DIR }}
      DEPLOY_HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate deployment secrets
        run: |
          set -euo pipefail
          test -n "$ECS_HOST"
          test -n "$ECS_SSH_USER"
          test -n "$ECS_SSH_KEY"

      - name: Configure SSH
        run: |
          set -euo pipefail
          port="${ECS_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/ecs_deploy_key
          chmod 600 ~/.ssh/ecs_deploy_key
          ssh-keyscan -p "$port" "$ECS_HOST" >> ~/.ssh/known_hosts

      - name: Sync application to ECS
        run: |
          set -euo pipefail
          port="${ECS_SSH_PORT:-22}"
          app_dir="${ECS_APP_DIR:-/opt/describeops}"

          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='.env.*.local' \
            --exclude='node_modules/' \
            --exclude='**/node_modules/' \
            --exclude='**/dist/' \
            --exclude='backend/.venv/' \
            --exclude='backend/.pytest_cache/' \
            --exclude='backend/db.sqlite3' \
            --exclude='backend/media/' \
            --exclude='screenshots/' \
            --exclude='outputs/' \
            -e "ssh -i ~/.ssh/ecs_deploy_key -p ${port} -o StrictHostKeyChecking=yes" \
            ./ "${ECS_SSH_USER}@${ECS_HOST}:${app_dir}/"

      - name: Rebuild and restart Compose stack
        run: |
          set -euo pipefail
          port="${ECS_SSH_PORT:-22}"
          app_dir="${ECS_APP_DIR:-/opt/describeops}"

          ssh -i ~/.ssh/ecs_deploy_key -p "$port" -o StrictHostKeyChecking=yes \
            "${ECS_SSH_USER}@${ECS_HOST}" \
            "APP_DIR=${app_dir@Q} bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"
          test -f .env
          docker compose --env-file .env config --quiet
          docker compose --env-file .env down --remove-orphans
          docker compose --env-file .env up -d --build --remove-orphans
          docker compose ps
          REMOTE

      - name: Check public health endpoint
        if: ${{ env.DEPLOY_HEALTH_URL != '' }}
        run: curl -fsS --retry 12 --retry-delay 5 --retry-all-errors "$DEPLOY_HEALTH_URL"
